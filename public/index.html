<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuestador — TBLD</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.8.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f2;
      --surface: #ffffff;
      --surface2: #f9f8f7;
      --border: #e4e2de;
      --border-strong: #ccc9c4;
      --text: #1a1a18;
      --text-2: #6b6860;
      --text-3: #a09d98;
      --accent: #1a6ef5;
      --accent-bg: #eef3fe;
      --accent-text: #1249b0;
      --danger: #c0392b;
      --danger-bg: #fef0ee;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: #000000;
      border-bottom: 1px solid #000000;
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-group { display: flex; align-items: center; gap: 12px; }
    .logo-img { height: 38px; width: auto; display: block; }
    .logo-divider { width: 1px; height: 22px; background: rgba(255,255,255,.25); }
    .logo-text { font-size: 13.5px; font-weight: 500; color: #fff; letter-spacing: -.01em; }
    .logo-text span { color: rgba(255,255,255,.55); font-weight: 400; }
    .header-tag { font-size: 11.5px; color: rgba(255,255,255,.45); }

    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      height: calc(100vh - 52px);
    }

    /* ── MAIN ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }

    .main-header {
      padding: 20px 24px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .main-header h2 {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 12px;
    }

    /* AUTOCOMPLETE */
    .autocomplete-wrap {
      position: relative;
    }
    .autocomplete-input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 0 36px 0 12px;
      font-size: 13.5px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .autocomplete-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,110,245,.1);
    }
    .autocomplete-icon {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      font-size: 17px;
      pointer-events: none;
    }
    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      z-index: 200;
      max-height: 320px;
      overflow-y: auto;
      display: none;
    }
    .dropdown.open { display: block; }
    .dd-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item.focused { background: var(--accent-bg); }
    .dd-item-info { flex: 1; min-width: 0; }
    .dd-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dd-sub { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }
    .dd-price { font-size: 12.5px; font-weight: 500; color: var(--text-2); white-space: nowrap; }
    .dd-cat { font-size: 10.5px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-3); padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
    .dd-empty { padding: 20px; text-align: center; font-size: 13px; color: var(--text-3); }

    /* TABLA DE ÍTEMS */
    .table-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text-3);
    }
    .empty-state i { font-size: 36px; opacity: .4; }
    .empty-state p { font-size: 13px; }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    thead th {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 0 10px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    thead th.r { text-align: right; }
    thead th.c { text-align: center; }
    .col-des { width: 36%; }
    .col-mar { width: 13%; }
    .col-pre { width: 14%; }
    .col-qty { width: 12%; }
    .col-coef { width: 11%; }
    .col-sub { width: 14%; }
    .col-del { width: 5%; }

    tbody tr {
      border-bottom: 1px solid var(--border);
    }
    tbody tr:hover { background: #faf9f8; }
    td {
      padding: 8px 10px;
      font-size: 12.5px;
      vertical-align: middle;
    }
    td.r { text-align: right; }
    td.c { text-align: center; }
    .td-name { font-weight: 500; }
    .td-det { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    .qty-input, .coef-input {
      height: 30px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .qty-input:focus, .coef-input:focus {
      border-color: var(--accent);
    }
    .sub-val { font-size: 12.5px; font-weight: 500; color: var(--accent-text); }
    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color .1s, background .1s;
    }
    .del-btn:hover { color: var(--danger); background: var(--danger-bg); }

    /* ── SIDEBAR ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }
    .sb-section {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sb-section h3 {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 10px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 12px; color: var(--text-2); }
    .field input {
      height: 34px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 0 10px;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--accent); }

    .config-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .config-row label { font-size: 12.5px; color: var(--text-2); }
    .config-row input {
      width: 70px;
      height: 32px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 0 8px;
      font-size: 13px;
      text-align: center;
      color: var(--text);
      background: var(--surface);
      outline: none;
    }
    .config-row input:focus { border-color: var(--accent); }
    .iva-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .iva-row input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
    .iva-row label { font-size: 12.5px; color: var(--text-2); cursor: pointer; }

    .totals-area {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      margin-top: auto;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 12.5px;
      color: var(--text-2);
      margin-bottom: 5px;
    }
    .total-main {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      padding-top: 8px;
      border-top: 1px solid var(--border);
      margin: 6px 0 14px;
    }
    .btn-gen {
      width: 100%;
      height: 40px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity .15s;
    }
    .btn-gen:hover { opacity: .85; }
    .btn-gen:disabled { opacity: .3; cursor: default; }

    /* MODAL */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }
    .modal-header h2 { font-size: 15px; font-weight: 600; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--text-2); padding: 4px;
      border-radius: 6px; display: flex;
    }
    .modal-close:hover { background: var(--surface2); }
    .modal-body { padding: 0; }
    .pres-doc { padding: 24px; }

    .pres-brand-bar {
      background: #000;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .pres-brand-bar img { height: 34px; width: auto; display: block; }
    .pres-brand-bar .brand-name { color: #fff; font-size: 13px; font-weight: 500; letter-spacing: .02em; }

    .pres-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .pres-title { font-size: 30px; font-weight: 700; }
    .pres-num { font-size: 13px; color: var(--text-3); margin-top: 2px; }
    .pres-sello {
      background: var(--text); color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 6px 16px; border-radius: 50px;
    }
    .pres-meta { margin-bottom: 20px; }
    .pres-meta p { font-size: 13px; margin-bottom: 4px; }
    .pres-meta strong { font-weight: 500; }

    .pres-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    .pres-table th {
      font-size: 11px; font-weight: 500; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .04em;
      padding: 6px 10px; text-align: left;
      border-bottom: 2px solid var(--text);
    }
    .pres-table th.r { text-align: right; }
    .pres-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 12.5px; }
    .pres-table td.r { text-align: right; font-weight: 500; }
    .pres-totals { margin-bottom: 8px; }
    .pres-trow { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
    .pres-total-main {
      display: flex; justify-content: space-between; align-items: baseline;
      padding-top: 10px; border-top: 2px solid var(--text); margin-top: 6px;
    }
    .pres-total-main span:first-child { font-size: 14px; font-weight: 500; }
    .pres-total-main span:last-child { font-size: 24px; font-weight: 700; }
    .pres-footer { font-size: 11.5px; color: var(--text-3); border-top: 1px solid var(--border); padding-top: 12px; margin-top: 16px; }

    .modal-actions {
      display: flex; gap: 10px;
      padding: 16px 22px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      border-radius: 0 0 12px 12px;
      position: sticky; bottom: 0;
    }
    .btn-sec {
      flex: 1; height: 38px;
      border: 1px solid var(--border-strong);
      background: var(--surface); border-radius: var(--radius);
      font-size: 13px; cursor: pointer; color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-sec:hover { background: var(--surface2); }
    .btn-pri {
      flex: 1; height: 38px;
      background: var(--text); color: #fff; border: none;
      border-radius: var(--radius); font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-pri:hover { opacity: .85; }

    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .main { height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .table-wrap { min-height: 300px; }
      .sidebar { height: auto; }
      .totals-area { margin-top: 0; }
    }
  </style>
</head>

<div class="layout">

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <h2>Ítems del presupuesto</h2>
      <div class="autocomplete-wrap">
        <input class="autocomplete-input" id="ac-input" type="text"
          placeholder="Buscar y agregar producto — escribí descripción, marca o código…"
          autocomplete="off">
        <i class="ti ti-search autocomplete-icon" aria-hidden="true"></i>
        <div class="dropdown" id="dropdown"></div>
      </div>
    </div>

    <div class="table-wrap" id="table-wrap">
      <div class="empty-state" id="empty-state">
        <i class="ti ti-package" aria-hidden="true"></i>
        <p>Buscá un producto arriba para agregarlo al presupuesto</p>
      </div>
      <table id="items-table" style="display:none">
        <thead>
          <tr>
            <th class="col-des">Descripción</th>
            <th class="col-mar">Marca</th>
            <th class="col-pre r">P. unit.</th>
            <th class="col-qty c">Cant.</th>
            <th class="col-coef c">Coef.</th>
            <th class="col-sub r">Subtotal</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="items-body"></tbody>
      </table>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-section">
      <h3>Datos</h3>
      <div class="field">
        <label>Cliente</label>
        <input type="text" id="cliente" placeholder="Nombre del cliente">
      </div>
      <div class="field">
        <label>Proyecto</label>
        <input type="text" id="proyecto" placeholder="Ej: Cocina + lavadero">
      </div>
    </div>

    <div class="sb-section">
      <h3>Precios</h3>
      <div class="config-row">
        <label for="coef-global">Coeficiente global</label>
        <input type="number" id="coef-global" value="2" min="1" step="0.1">
      </div>
      <div style="font-size:11.5px;color:var(--text-3);margin-bottom:10px">
        Precio final = costo × coeficiente
      </div>
      <div class="iva-row">
        <input type="checkbox" id="add-iva">
        <label for="add-iva">Agregar IVA 21%</label>
      </div>
    </div>

    <div class="totals-area">
      <div class="total-row"><span>Costo s/margen</span><span id="t-costo">$0</span></div>
      <div class="total-row"><span>Precio s/IVA</span><span id="t-precio">$0</span></div>
      <div class="total-row" id="row-iva" style="display:none"><span>IVA 21%</span><span id="t-iva">$0</span></div>
      <div class="total-main"><span>Total</span><span id="t-total">$0</span></div>
      <button class="btn-gen" id="btn-gen" disabled onclick="abrirModal()">
        <i class="ti ti-file-description" aria-hidden="true"></i>
        Ver presupuesto
      </button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="cerrarBg(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>Vista previa</h2>
      <button class="modal-close" onclick="cerrarModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="window.print()"><i class="ti ti-printer" aria-hidden="true"></i> Imprimir / PDF</button>
      <button class="btn-pri" onclick="cerrarModal()"><i class="ti ti-check" aria-hidden="true"></i> Listo</button>
    </div>
  </div>
</div>

 Ruedas","mar":"BRONZEN","cod":"RUE-24","des":"Rueda goma c/base giratoria 50mm","det":"","pre":832}];

const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');
let items = [];
let ddFocus = -1;

// ── AUTOCOMPLETE ──
const input = document.getElementById('ac-input');
const dd = document.getElementById('dropdown');

input.addEventListener('input', () => { ddFocus = -1; renderDD(); });
input.addEventListener('keydown', e => {
  const items = dd.querySelectorAll('.dd-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); ddFocus = Math.min(ddFocus + 1, items.length - 1); highlightDD(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); ddFocus = Math.max(ddFocus - 1, 0); highlightDD(); }
  else if (e.key === 'Enter') { e.preventDefault(); if (ddFocus >= 0 && items[ddFocus]) items[ddFocus].click(); }
  else if (e.key === 'Escape') { closDD(); }
});
document.addEventListener('click', e => { if (!e.target.closest('.autocomplete-wrap')) closDD(); });

function highlightDD() {
  dd.querySelectorAll('.dd-item').forEach((el, i) => el.classList.toggle('focused', i === ddFocus));
}

function renderDD() {
  const q = input.value.trim().toLowerCase();
  if (q.length < 2) { closDD(); return; }
  const results = P.filter(p =>
    p.des.toLowerCase().includes(q) ||
    p.mar.toLowerCase().includes(q) ||
    p.cod.toLowerCase().includes(q) ||
    (p.det && p.det.toLowerCase().includes(q))
  ).slice(0, 12);

  if (!results.length) {
    dd.innerHTML = '<div class="dd-empty">Sin resultados</div>';
    dd.classList.add('open');
    return;
  }
  dd.innerHTML = results.map((p, i) => `
    <div class="dd-item" data-idx="${P.indexOf(p)}">
      <div class="dd-item-info">
        <div class="dd-name">${p.des}</div>
        <div class="dd-sub">${p.mar} · ${p.cod}${p.det ? ' · ' + p.det : ''}</div>
      </div>
      <span class="dd-cat">${p.cat.split(' ')[0]}</span>
      <div class="dd-price">${fmt(p.pre)}</div>
    </div>
  `).join('');
  dd.querySelectorAll('.dd-item').forEach(el => {
    el.addEventListener('click', () => addItem(parseInt(el.dataset.idx)));
  });
  dd.classList.add('open');
}

function closDD() { dd.classList.remove('open'); dd.innerHTML = ''; ddFocus = -1; }

function addItem(pidx) {
  const p = P[pidx];
  const globalCoef = parseFloat(document.getElementById('coef-global').value) || 2;
  const existing = items.find(it => it.pidx === pidx);
  if (existing) { existing.qty++; }
  else { items.push({ pidx, qty: 1, coef: globalCoef }); }
  input.value = '';
  closDD();
  renderTable();
  recalc();
}

// ── TABLA ──
function renderTable() {
  const empty = document.getElementById('empty-state');
  const table = document.getElementById('items-table');
  const tbody = document.getElementById('items-body');
  if (!items.length) { empty.style.display = 'flex'; table.style.display = 'none'; return; }
  empty.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = items.map((it, i) => {
    const p = P[it.pidx];
    const sub = p.pre * it.qty * it.coef;
    return `<tr>
      <td>
        <div class="td-name">${p.des}</div>
        ${p.det ? `<div class="td-det">${p.det}</div>` : ''}
      </td>
      <td style="color:var(--text-2);font-size:12px">${p.mar}</td>
      <td class="r" style="color:var(--text-2)">${fmt(p.pre)}</td>
      <td class="c"><input class="qty-input" type="number" min="1" value="${it.qty}" data-i="${i}" onchange="updateQty(this)"></td>
      <td class="c"><input class="coef-input" type="number" min="1" step="0.1" value="${it.coef}" data-i="${i}" onchange="updateCoef(this)"></td>
      <td class="r"><span class="sub-val">${fmt(sub)}</span></td>
      <td class="c"><button class="del-btn" onclick="removeItem(${i})" aria-label="Eliminar"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
    </tr>`;
  }).join('');
}

function updateQty(input) {
  const i = parseInt(input.dataset.i);
  items[i].qty = Math.max(1, parseInt(input.value) || 1);
  renderTable(); recalc();
}
function updateCoef(input) {
  const i = parseInt(input.dataset.i);
  items[i].coef = parseFloat(input.value) || 1;
  renderTable(); recalc();
}
function removeItem(i) {
  items.splice(i, 1);
  renderTable(); recalc();
}

// ── TOTALES ──
function recalc() {
  let costo = 0, precio = 0;
  items.forEach(it => {
    const p = P[it.pidx];
    costo += p.pre * it.qty;
    precio += p.pre * it.qty * it.coef;
  });
  const iva = precio * 0.21;
  const addIva = document.getElementById('add-iva').checked;
  const total = addIva ? precio + iva : precio;
  document.getElementById('t-costo').textContent = fmt(costo);
  document.getElementById('t-precio').textContent = fmt(precio);
  document.getElementById('t-iva').textContent = fmt(iva);
  document.getElementById('row-iva').style.display = addIva ? 'flex' : 'none';
  document.getElementById('t-total').textContent = fmt(total);
  document.getElementById('btn-gen').disabled = items.length === 0;
}

document.getElementById('coef-global').addEventListener('input', () => {
  const g = parseFloat(document.getElementById('coef-global').value) || 2;
  items.forEach(it => it.coef = g);
  renderTable(); recalc();
});
document.getElementById('add-iva').addEventListener('change', recalc);

// ── MODAL ──
function abrirModal() {
  const addIva = document.getElementById('add-iva').checked;
  const cliente = document.getElementById('cliente').value || '—';
  const proyecto = document.getElementById('proyecto').value || '—';
  const fecha = new Date().toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'});
  const num = String(Date.now()).slice(-4);

  let costo = 0, precio = 0;
  const rows = items.map(it => {
    const p = P[it.pidx];
    const sub = p.pre * it.qty * it.coef;
    costo += p.pre * it.qty;
    precio += sub;
    return `<tr>
      <td>${p.des}${p.det ? '<br><span style="font-size:11px;color:#aaa">' + p.det + '</span>' : ''}</td>
      <td>${p.mar}</td>
      <td class="r">${it.qty}</td>
      <td class="r">${fmt(p.pre)}</td>
      <td class="r">${fmt(sub)}</td>
    </tr>`;
  }).join('');

  const iva = precio * 0.21;
  const total = addIva ? precio + iva : precio;

  document.getElementById('modal-body').innerHTML = `
    <div class="pres-brand-bar">
      <img src="data:image/png;base64,${LOGO_B64}" alt="Tablada">
      <span class="brand-name">Tablada — Muebles de diseño</span>
    </div>
    <div class="pres-doc">
    <div class="pres-top">
      <div>
        <div class="pres-title">PRESUPUESTO</div>
        <div class="pres-num">N° ${num} · ${fecha}</div>
      </div>
      <div class="pres-sello">BORRADOR</div>
    </div>
    <div class="pres-meta">
      <p><strong>Cliente:</strong> ${cliente}</p>
      <p><strong>Proyecto:</strong> ${proyecto}</p>
    </div>
    <table class="pres-table">
      <thead>
        <tr>
          <th style="width:38%">Descripción</th>
          <th style="width:14%">Marca</th>
          <th class="r" style="width:10%">Cant.</th>
          <th class="r" style="width:16%">P. unit.</th>
          <th class="r" style="width:22%">Subtotal</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="pres-totals">
      <div class="pres-trow"><span>Precio s/IVA</span><span>${fmt(precio)}</span></div>
      ${addIva ? `<div class="pres-trow"><span>IVA 21%</span><span>${fmt(iva)}</span></div>` : ''}
      <div class="pres-total-main">
        <span>TOTAL ${addIva ? 'c/IVA' : 's/IVA'}</span>
        <span>${fmt(total)}</span>
      </div>
    </div>
    <div class="pres-footer">
      Precios en pesos argentinos. Sujetos a variación sin previo aviso.<br>
      Válido por 7 días desde la fecha de emisión. Sin IVA salvo indicación.
    </div>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function cerrarModal() { document.getElementById('modal-bg').classList.remove('open'); }
function cerrarBg(e) { if (e.target === document.getElementById('modal-bg')) cerrarModal(); }
</script>
